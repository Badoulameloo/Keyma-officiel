<!DOCTYPE html>

<body>

                </div>
                <div class="info-group">
                    <label>Email</label>
                    <p id="prof-email">alioune@iam.sn</p>
                </div>
                
                <hr>
                
                <h3>Sécurité</h3>
                <form onsubmit="alert('Mot de passe mis à jour !'); return false;">
                    <div class="field">
                        <input type="password" placeholder="Ancien mot de passe" required>
                    </div>
                    <div class="field">
                        <input type="password" placeholder="Nouveau mot de passe" required>
                    </div>
                    <button type="submit" class="btn-buy-now">Modifier le mot de passe</button>
                </form>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
