    <script>
        // 1. Menu Profil (Toggle)
function toggleUserMenu(event) {
    event.preventDefault();
    const dropdown = document.getElementById('user-dropdown');
    if (dropdown) {
        dropdown.style.display = (dropdown.style.display === 'block') ? 'none' : 'block';
    }
}

// 2. Fermer le menu si on clique n'importe où ailleurs sur la page
window.addEventListener('click', function(event) {
    const dropdown = document.getElementById('user-dropdown');
    const userMenu = document.querySelector('.user-menu-container');
    
    // Si le menu est ouvert et qu'on clique en dehors de l'icône/menu
    if (dropdown && !userMenu.contains(event.target)) {
        dropdown.style.display = 'none';
    }
});

// 3. Gestion de la déconnexion
function handleLogout() {
    localStorage.removeItem('isLoggedIn'); 
    alert("Vous avez été déconnectée de l'univers KEYMA.");
    window.location.href = 'index.html';
}

// 4. Mise à jour du compteur panier (pour qu'il soit juste sur toutes les pages)
function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('keyma_cart')) || [];
    const countElement = document.getElementById('cart-count');
    if (countElement) {
        countElement.innerText = cart.length;
    }
}

// Lancer au chargement de n'importe quelle page
document.addEventListener('DOMContentLoaded', updateCartCount);
    </script>
