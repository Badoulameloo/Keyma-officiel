<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Univers | KEYMA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="nav-left">
                <input type="checkbox" id="menu-toggle">
                <label for="menu-toggle" class="hamburger"><span></span><span></span></label>
                <ul class="menu">
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="about.html">À Propos</a></li>
                    <li><a href="shop.html">Boutique</a></li>
                    <li><a href="auth.html">Mon Compte</a></li>
                </ul>
            </div>
            <div class="nav-center"><a href="index.html" class="logo-gold">KEYMA</a></div>
            <div class="nav-right"><a href="cart.html" class="cart-link">PANIER (<span id="cart-count">0</span>)</a></div>
        </nav>
    </header>

    <main class="auth-page">
        <section class="auth-container-v2">
            <h1 id="auth-title" class="auth-title-gold">Connexion</h1>
            <p id="auth-subtitle" class="auth-subtitle-clean">Entrez dans l'univers KEYMA</p>

            <form id="login-form" class="auth-form-minimal" onsubmit="handleAuth(event, 'login')">
                <div class="field">
                    <input type="email" id="login-email" placeholder="Email" required>
                </div>
                <div class="field">
                    <input type="password" id="login-pass" placeholder="Mot de passe" required>
                </div>
                <div class="auth-links-extra">
    <a href="#" class="secondary-link" onclick="forgotPassword()">Mot de passe oublié ?</a>
</div>
                <button type="submit" class="btn-auth-submit">Se Connecter</button>
                <div class="auth-links-extra">
                    <a href="#" class="secondary-link" onclick="toggleAuth(event, 'signup')">Pas de compte ? Créer un compte</a>
                </div>
            </form>

            <form id="signup-form" class="auth-form-minimal" style="display: none;" onsubmit="handleAuth(event, 'signup')">
                <div class="field">
                    <input type="text" id="signup-name" placeholder="Nom complet" required>
                </div>
                <div class="field">
                    <input type="email" id="signup-email" placeholder="Email" required>
                </div>
                <div class="field">
                    <input type="password" id="signup-pass" placeholder="Créer un mot de passe" required>
                </div>
                <button type="submit" class="btn-auth-submit">Rejoindre KEYMA</button>
                <div class="auth-links-extra">
                    <a href="#" class="secondary-link" onclick="toggleAuth(event, 'login')">Déjà inscrite ? Se connecter</a>
                </div>
            </form>

            <div class="auth-divider-horizontal"></div>
            <div class="guest-option">
                <a href="javascript:history.back()" class="guest-link">Continuer en tant qu'invitée</a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 KEYMA - L'élégance à chaque instant.</p>
    </footer>

    <script>
        // Fonction pour basculer entre Connexion et Inscription
function toggleAuth(event, mode) {
    event.preventDefault();
    const loginForm = document.getElementById('login-form');
    const signupForm = document.getElementById('signup-form');
    const title = document.getElementById('auth-title');
    const subtitle = document.getElementById('auth-subtitle');

    if (mode === 'signup') {
        loginForm.style.display = 'none';
        signupForm.style.display = 'block';
        title.innerText = 'Inscription';
        subtitle.innerText = 'Créez votre compte personnel';
    } else {
        loginForm.style.display = 'block';
        signupForm.style.display = 'none';
        title.innerText = 'Connexion';
        subtitle.innerText = 'Entrez dans l\'univers KEYMA';
    }
}

// Fonction pour gérer la redirection après validation
function handleAuth(event, mode) {
    event.preventDefault(); // Empêche le rechargement de la page
    
    // Ici on simule une validation réussie
    alert(mode === 'login' ? "Connexion réussie !" : "Compte créé avec succès !");
    
    // REDIRECTION VERS L'ACCUEIL
    window.location.href = 'index.html';
}
function forgotPassword() {
    const email = prompt("Veuillez entrer votre adresse email pour recevoir un lien de réinitialisation :");
    if (email) {
        alert("Un email de récupération a été envoyé à : " + email);
    }
}
    </script>
</body>
</html>
