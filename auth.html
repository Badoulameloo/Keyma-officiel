<main class="auth-container">
    <div class="auth-wrapper">
        
        <section class="auth-box">
            <h2 class="auth-title">Se Connecter</h2>
            <p class="auth-subtitle">Déjà cliente KEYMA ?</p>
            <form action="#" class="auth-form">
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Mot de passe" required>
                <button type="submit" class="btn-black">Connexion</button>
                <a href="#" class="forgot-pass">Mot de passe oublié ?</a>
            </form>
        </section>

        <div class="auth-divider"></div>

        <section class="auth-box">
            <h2 class="auth-title">S'inscrire</h2>
            <p class="auth-subtitle">Rejoignez l'univers KEYMA</p>
            <p class="auth-info">Créez un compte pour suivre vos commandes et profiter d'une expérience personnalisée.</p>
            <form action="#" class="auth-form">
                <input type="text" name="firstname" placeholder="Prénom" required>
                <input type="text" name="lastname" placeholder="Nom" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Mot de passe" required>
                <button type="submit" class="btn-gold-outline">Créer mon compte</button>
            </form>
        </section>

    </div>
    
    <div class="guest-action">
        <p>Vous souhaitez commander sans compte ?</p>
        <a href="shop.html" class="link-underline">Continuer vers la boutique</a>
    </div>
</main>
