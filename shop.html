    <script>
        // Mise à jour du badge PANIER (X)
function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('keyma_cart')) || [];
    const countElement = document.getElementById('cart-count');
    if (countElement) {
        // On calcule le total des quantités
        const totalQty = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
        countElement.innerText = totalQty;
    }
}

// Ajouter au panier avec gestion des quantités et images
function addToCart(name, price, image) {
    let cart = JSON.parse(localStorage.getItem('keyma_cart')) || [];
    
    // On vérifie si le produit existe déjà
    const existingProduct = cart.find(item => item.name === name);

    if (existingProduct) {
        existingProduct.quantity += 1;
    } else {
        cart.push({ 
            name: name, 
            price: price, 
            image: image, 
            quantity: 1 
        });
    }

    localStorage.setItem('keyma_cart', JSON.stringify(cart));
    updateCartCount();
    alert(name + " a été ajouté à votre sélection ✨");
}

function buyNow(name, price, image) {
    addToCart(name, price, image);
    window.location.href = 'checkout.html';
}

document.addEventListener('DOMContentLoaded', updateCartCount);
    </script>
