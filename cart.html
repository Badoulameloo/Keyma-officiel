<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Panier | KEYMA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="nav-left">
                <input type="checkbox" id="menu-toggle">
                <label for="menu-toggle" class="hamburger"><span></span><span></span></label>
                <ul class="menu">
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="about.html">À Propos</a></li>
                    <li><a href="shop.html">Boutique</a></li>
                    <li><a href="auth.html">Mon Compte</a></li>
                </ul>
            </div>
            <div class="nav-center"><a href="index.html" class="logo-gold">KEYMA</a></div>
            <div class="nav-right">
    <div class="user-menu-container">
        <a href="#" class="user-icon" onclick="toggleUserMenu(event)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        </a>
        <div id="user-dropdown" class="user-dropdown">
            <a href="profile.html">Mon Profil</a>
            <a href="#" onclick="handleLogout()">Déconnexion</a>
        </div>
    </div>
    
    <a href="cart.html" class="cart-link">PANIER (<span id="cart-count">0</span>)</a>
</div>
</div>
        </nav>
    </header>

    <main class="cart-page">
    <h1 class="cart-title">Votre Sélection</h1>

    <div id="empty-cart-msg" style="display: none; text-align: center; padding: 50px 0;">
        <p style="font-size: 1.2rem; color: #888; margin-bottom: 2rem;">Votre panier est actuellement vide.</p>
        <a href="shop.html" class="btn-outline-minimal">Continuer mes achats</a>
    </div>

    <div id="cart-content" class="cart-container">
        <div class="cart-items" id="items-list">
            </div>

        <aside class="cart-summary">
            <div class="summary-box">
                <h3>Résumé</h3>
                <div class="summary-line"><span>Total</span> <span id="cart-total-price">0 CFA</span></div>
                <a href="checkout.html" class="btn-checkout">Procéder au paiement</a>
            </div>
        </aside>
    </div>
</main>
            </aside>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 KEYMA - La pureté du geste.</p>
    </footer>

    <script>

        // 1. Initialisation au chargement de la page
document.addEventListener('DOMContentLoaded', function() {
    const cart = JSON.parse(localStorage.getItem('keyma_cart')) || [];
    const emptyMsg = document.getElementById('empty-cart-msg');
    const cartContent = document.getElementById('cart-content');

    if (cart.length === 0) {
        emptyMsg.style.display = 'block';
        cartContent.style.display = 'none';
    } else {
        emptyMsg.style.display = 'none';
        cartContent.style.display = 'grid';
        renderCartItems(cart);
        updateCartTotal(); // Calcule le total dès l'ouverture
    }
    updateCartCount(); // Met à jour le badge (0)
});

// 2. Affichage des articles dans la liste
function renderCartItems(cart) {
    const list = document.getElementById('items-list');
    list.innerHTML = ''; 
    
    cart.forEach((item, index) => {
        // On s'assure que la quantité existe, sinon on met 1
        const qty = item.quantity || 1;
        
        list.innerHTML += `
            <div class="cart-item" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
                <div class="item-info">
                    <h3 style="font-family: 'Playfair Display', serif; margin-bottom: 5px;">${item.name}</h3>
                    <p class="item-price" style="color: #D4AF37;">${item.price.toLocaleString()} CFA x ${qty}</p>
                </div>
                <div class="item-actions">
                    <button onclick="removeItem(${index})" style="background: none; border: none; color: #888; cursor: pointer; text-decoration: underline; font-size: 0.8rem;">Supprimer</button>
                </div>
            </div>
        `;
    });
}

// 3. Calcul et affichage du TOTAL
function updateCartTotal() {
    const cart = JSON.parse(localStorage.getItem('keyma_cart')) || [];
    const totalElement = document.getElementById('cart-total-price');
    
    const total = cart.reduce((sum, item) => {
        const qty = item.quantity || 1;
        return sum + (item.price * qty);
    }, 0);

    if (totalElement) {
        totalElement.innerText = total.toLocaleString() + " CFA";
    }
}

// 4. Supprimer un article
function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem('keyma_cart')) || [];
    cart.splice(index, 1); // Retire l'élément à cet index
    localStorage.setItem('keyma_cart', JSON.stringify(cart));
    
    // On recharge l'affichage sans rafraîchir la page
    if (cart.length === 0) {
        location.reload(); // Plus simple pour afficher le message "Panier vide"
    } else {
        renderCartItems(cart);
        updateCartTotal();
        updateCartCount();
    }
}

// 5. Mise à jour du petit badge "PANIER (X)"
function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('keyma_cart')) || [];
    const countElement = document.getElementById('cart-count');
    if (countElement) {
        const totalQty = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
        countElement.innerText = totalQty;
    }
}

// --- FONCTIONS MENU & AUTH ---
function toggleUserMenu(event) {
    event.preventDefault();
    const dropdown = document.getElementById('user-dropdown');
    dropdown.style.display = (dropdown.style.display === 'block') ? 'none' : 'block';
}

function handleLogout() {
    localStorage.removeItem('isLoggedIn'); 
    alert("Vous avez été déconnectée de l'univers KEYMA.");
    window.location.href = 'index.html';
}
</script>

</body>
</html>
