<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Panier | KEYMA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="nav-left">
                <input type="checkbox" id="menu-toggle">
                <label for="menu-toggle" class="hamburger"><span></span><span></span></label>
                <ul class="menu">
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="about.html">À Propos</a></li>
                    <li><a href="shop.html">Boutique</a></li>
                    <li><a href="auth.html">Mon Compte</a></li>
                </ul>
            </div>
            <div class="nav-center"><a href="index.html" class="logo-gold">KEYMA</a></div>
            <div class="nav-right">
    <div class="user-menu-container">
        <a href="#" class="user-icon" onclick="toggleUserMenu(event)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        </a>
        <div id="user-dropdown" class="user-dropdown">
            <a href="profile.html">Mon Profil</a>
            <a href="#" onclick="handleLogout()">Déconnexion</a>
        </div>
    </div>
    
    <a href="cart.html" class="cart-link">PANIER (<span id="cart-count">0</span>)</a>
</div>
</div>
        </nav>
    </header>

    <main class="cart-page">
    <h1 class="cart-title">Votre Sélection</h1>

    <div id="empty-cart-msg" style="display: none; text-align: center; padding: 50px 0;">
        <p style="font-size: 1.2rem; color: #888; margin-bottom: 2rem;">Votre panier est actuellement vide.</p>
        <a href="shop.html" class="btn-outline-minimal">Continuer mes achats</a>
    </div>

    <div id="cart-content" class="cart-container">
        <div class="cart-items" id="items-list">
            </div>

        <aside class="cart-summary">
            <div class="summary-box">
                <h3>Résumé</h3>
                <div class="summary-line"><span>Total</span> <span id="cart-total-price">0 CFA</span></div>
                <a href="checkout.html" class="btn-checkout">Procéder au paiement</a>
            </div>
        </aside>
    </div>
</main>
            </aside>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 KEYMA - La pureté du geste.</p>
    </footer>

    <script>

        function updateCartCount() {
    // On récupère le panier dans le stockage du navigateur
    const cart = JSON.parse(localStorage.getItem('keyma_cart')) || [];
    
    // On calcule le nombre total d'articles
    const totalItems = cart.length;
    
    // On cible la balise span qu'on a créée
    const countElement = document.getElementById('cart-count');
    
    if (countElement) {
        countElement.innerText = totalItems;
    }
}

// On lance la fonction dès que la page est chargée
document.addEventListener('DOMContentLoaded', updateCartCount);
    document.addEventListener('DOMContentLoaded', function() {
    const cart = JSON.parse(localStorage.getItem('keyma_cart')) || [];
    const emptyMsg = document.getElementById('empty-cart-msg');
    const cartContent = document.getElementById('cart-content');

    if (cart.length === 0) {
        // Si le panier est vide
        emptyMsg.style.display = 'block';
        cartContent.style.display = 'none';
    } else {
        // Si le panier contient des articles
        emptyMsg.style.display = 'none';
        cartContent.style.display = 'grid';
        renderCartItems(cart);
    }
});

function renderCartItems(cart) {
    const list = document.getElementById('items-list');
    list.innerHTML = ''; // On nettoie avant d'afficher
    
    cart.forEach(item => {
        list.innerHTML += `
            <div class="cart-item">
                <div class="item-info">
                    <h3>${item.name}</h3>
                    <p class="item-price">${item.price} CFA</p>
                </div>
            </div>
        `;
    });
}
// 1. Menu Profil (Toggle)
function toggleUserMenu(event) {
    event.preventDefault();
    const dropdown = document.getElementById('user-dropdown');
    if (dropdown) {
        dropdown.style.display = (dropdown.style.display === 'block') ? 'none' : 'block';
    }
}

// 2. Fermer le menu si on clique n'importe où ailleurs sur la page
window.addEventListener('click', function(event) {
    const dropdown = document.getElementById('user-dropdown');
    const userMenu = document.querySelector('.user-menu-container');
    
    // Si le menu est ouvert et qu'on clique en dehors de l'icône/menu
    if (dropdown && !userMenu.contains(event.target)) {
        dropdown.style.display = 'none';
    }
});

// 3. Gestion de la déconnexion
function handleLogout() {
    localStorage.removeItem('isLoggedIn'); 
    alert("Vous avez été déconnectée de l'univers KEYMA.");
    window.location.href = 'index.html';
}

// 4. Mise à jour du compteur panier (pour qu'il soit juste sur toutes les pages)
function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('keyma_cart')) || [];
    const countElement = document.getElementById('cart-count');
    if (countElement) {
        countElement.innerText = cart.length;
    }
}

// Lancer au chargement de n'importe quelle page
document.addEventListener('DOMContentLoaded', updateCartCount);
</script>

</body>
</html>
